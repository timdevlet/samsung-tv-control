name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  build:
    name: Build ${{ matrix.name }}
    needs: [lint, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: exe (Windows)
            dist: npm run dist:win
            artifact: windows-installer
            path: |
              release/*.exe
          - os: macos-latest
            name: dmg (macOS)
            dist: npm run dist -- --mac
            artifact: macos-dmg
            path: |
              release/*.dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build ${{ matrix.name }}
        run: ${{ matrix.dist }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    # Only publish on pushes to main (rolling "latest") or version tags (stable release).
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Publish binaries to a GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mapfile -t files < <(find dist -type f \( -name '*.exe' -o -name '*.dmg' \) | sort)
          echo "Found ${#files[@]} binaries:"
          printf '  %s\n' "${files[@]}"
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::No .exe or .dmg binaries were found in the artifacts."
            exit 1
          fi
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # Stable, versioned release from the pushed tag.
            gh release create "$GITHUB_REF_NAME" "${files[@]}" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes \
              --target "$GITHUB_SHA"
          else
            # Rolling prerelease that always reflects the latest commit on main.
            gh release delete latest --yes --cleanup-tag || true
            gh release create latest "${files[@]}" \
              --title "Latest (main)" \
              --prerelease \
              --target "$GITHUB_SHA" \
              --notes "Automated build from the latest commit on main (\`${GITHUB_SHA}\`)."
          fi
