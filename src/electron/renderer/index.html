<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline';" />
    <title>Samsung TV Control</title>
    <style>
      :root {
        --bg: #0d1117;
        --panel: #161b22;
        --border: #30363d;
        --text: #c9d1d9;
        --muted: #8b949e;
        --accent: #2563eb;
        --accent-hover: #3b82f6;
        --error: #f85149;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        display: flex;
        flex-direction: column;
        background: var(--bg);
        color: var(--text);
        font: 13px/1.5 "Segoe UI", system-ui, -apple-system, sans-serif;
      }
      header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        background: var(--bg);
        border-bottom: 1px solid var(--border);
        flex: none;
      }
      header .title { font-weight: 600; margin-right: auto; }
      header .title small { color: var(--muted); font-weight: 400; margin-left: 8px; }
      button {
        font: inherit;
        color: var(--text);
        background: #21262d;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 6px 12px;
        cursor: pointer;
      }
      button:hover { background: #30363d; }
      button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
      button.primary:hover { background: var(--accent-hover); }
      #log {
        flex: 1;
        overflow-y: auto;
        margin: 0;
        padding: 10px 14px;
        font-family: "Cascadia Code", "Consolas", ui-monospace, monospace;
        font-size: 12.5px;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .line { padding: 1px 0; }
      .line.error { color: var(--error); }
      .ts { color: var(--muted); }
      .var-string { color: #56d4dd; }
      .var-num { color: #e3b341; }
      /* Variables inside an error line keep the error color from overpowering them. */
      .line.error .var-string { color: #7ee8ef; }
      .line.error .var-num { color: #f0c674; }
      #log:empty::after {
        content: "Waiting for output…";
        color: var(--muted);
      }
      footer {
        flex: none;
        padding: 6px 14px;
        background: var(--panel);
        border-top: 1px solid var(--border);
        color: var(--muted);
        font-size: 12px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      footer label { display: flex; align-items: center; gap: 5px; cursor: pointer; }
      .count { margin-left: auto; }

      /* Auth status pill in the header */
      .status {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: var(--muted);
        margin-right: 4px;
      }
      .status .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--muted);
        flex: none;
      }
      .status.ok .dot { background: #3fb950; }
      .status.off .dot { background: var(--error); }

      /* Modal */
      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(1, 4, 9, 0.7);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .overlay.open { display: flex; }
      .modal {
        width: 100%;
        max-width: 440px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 20px;
      }
      .modal-header { display: flex; align-items: flex-start; gap: 8px; }
      .modal-header h2 { margin: 0 0 4px; font-size: 16px; flex: 1; }
      .modal .close {
        flex: none;
        margin: -4px -4px 0 0;
        padding: 4px 8px;
        font-size: 18px;
        line-height: 1;
        background: none;
        border: none;
        color: var(--muted);
      }
      .modal .close:hover { background: #30363d; color: var(--text); }
      .modal h2 { margin: 0 0 4px; font-size: 16px; }
      .modal p.hint { margin: 0 0 16px; color: var(--muted); font-size: 12px; }
      .field { margin-bottom: 12px; }
      .field label { display: block; margin-bottom: 4px; font-size: 12px; color: var(--muted); }
      .field input {
        width: 100%;
        font: inherit;
        color: var(--text);
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 7px 10px;
      }
      .field input:focus { outline: none; border-color: var(--accent); }
      .modal .error {
        color: var(--error);
        font-size: 12px;
        margin: 0 0 12px;
        min-height: 0;
      }
      .modal-actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
        margin-top: 16px;
      }
      .modal-actions .spacer { margin-right: auto; }
      button:disabled { opacity: 0.55; cursor: default; }
      /* Checkbox row inside a modal field */
      .field.check { display: flex; align-items: center; gap: 8px; }
      .field.check label { margin: 0; color: var(--text); cursor: pointer; }
      .field.check input { width: auto; }
    </style>
  </head>
  <body>
    <header>
      <span class="title">Samsung TV Control<small>log</small></span>
      <span class="status" id="status"><span class="dot"></span><span id="statusText">Checking…</span></span>
      <button id="loginBtn">Sign in</button>
      <button id="settingsBtn">Settings</button>
      <button id="wake" class="primary">Wake TV → PC</button>
      <button id="off">TV off + sleep</button>
      <button id="clear">Clear</button>
    </header>

    <div class="overlay" id="settingsOverlay">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
        <div class="modal-header">
          <h2 id="settingsTitle">Settings</h2>
          <button id="settingsCloseBtn" class="close" aria-label="Close">&times;</button>
        </div>
        <p class="hint">
          Paste the Client ID and Client Secret from your SmartThings OAuth-In app, then use
          Sign in (in the toolbar) to approve access — tokens are stored automatically. The PC
          input is matched against the TV's inputs by id or label.
        </p>
        <div class="field">
          <label for="clientId">Client ID</label>
          <input id="clientId" type="text" autocomplete="off" spellcheck="false" />
        </div>
        <div class="field">
          <label for="clientSecret">Client Secret</label>
          <input id="clientSecret" type="password" autocomplete="off" spellcheck="false" />
        </div>
        <div class="field">
          <label for="redirectUri">Redirect URI</label>
          <input id="redirectUri" type="text" autocomplete="off" spellcheck="false" />
        </div>
        <div class="field">
          <label for="pcInput">PC input</label>
          <input id="pcInput" type="text" autocomplete="off" spellcheck="false" placeholder="HDMI2" />
        </div>
        <div class="field check">
          <input id="minimizeToTray" type="checkbox" />
          <label for="minimizeToTray">Hide to tray on close (keep running in the background)</label>
        </div>
        <p class="error" id="settingsError"></p>
        <div class="modal-actions">
          <button id="logoutBtn" class="spacer">Sign out</button>
          <button id="settingsCancelBtn">Cancel</button>
          <button id="settingsSaveBtn" class="primary">Save</button>
        </div>
      </div>
    </div>
    <div id="log" role="log" aria-live="polite"></div>
    <footer>
      <label><input type="checkbox" id="autoscroll" checked /> Auto-scroll</label>
      <span class="count" id="count">0 lines</span>
    </footer>

    <script>
      const api = window.tvAPI;
      const logEl = document.getElementById("log");
      const countEl = document.getElementById("count");
      const autoscrollEl = document.getElementById("autoscroll");
      let count = 0;

      function nearBottom() {
        return logEl.scrollHeight - logEl.scrollTop - logEl.clientHeight < 40;
      }

      // Mirror of the highlighting rules in src/log.ts. Kept in sync by hand —
      // the timestamp is dimmed, and "variable" tokens (quoted strings, counts
      // like 1/3, numbers, → / ✅) are colored. Built with DOM text nodes (never
      // innerHTML) so log content can't inject markup under the strict CSP.
      const TIMESTAMP_RE = /^\[\d{1,2}:\d{2}:\d{2}(?:\s?[AP]M)?\]/i;
      const VAR_RE = /("[^"]*"|`[^`]*`)|(\b\d+(?:\.\d+)?(?:\/\d+)?(?:\s?(?:ms|s|min|m))?\b)|([→✅])/g;

      function highlightInto(div, text) {
        const ts = text.match(TIMESTAMP_RE);
        if (ts) {
          const span = document.createElement("span");
          span.className = "ts";
          span.textContent = ts[0];
          div.appendChild(span);
          text = text.slice(ts[0].length);
        }
        let last = 0;
        for (const m of text.matchAll(VAR_RE)) {
          if (m.index > last) div.appendChild(document.createTextNode(text.slice(last, m.index)));
          const span = document.createElement("span");
          span.className = m[1] || m[3] ? "var-string" : "var-num";
          span.textContent = m[0];
          div.appendChild(span);
          last = m.index + m[0].length;
        }
        if (last < text.length) div.appendChild(document.createTextNode(text.slice(last)));
      }

      function append(entry) {
        const atBottom = nearBottom();
        const div = document.createElement("div");
        div.className = "line" + (entry.level === "error" ? " error" : "");
        // Render blank-line separators (the daemon prefixes some lines with \n) as real spacing.
        highlightInto(div, entry.message.replace(/^\n+/, ""));
        if (/^\n/.test(entry.message)) div.style.marginTop = "8px";
        logEl.appendChild(div);
        count++;
        countEl.textContent = count + (count === 1 ? " line" : " lines");
        if (autoscrollEl.checked && atBottom) logEl.scrollTop = logEl.scrollHeight;
      }

      function reset() {
        logEl.replaceChildren();
        count = 0;
        countEl.textContent = "0 lines";
      }

      (async () => {
        const history = await api.getHistory();
        for (const entry of history) append(entry);
        logEl.scrollTop = logEl.scrollHeight;
      })();

      api.onLog(append);

      document.getElementById("wake").addEventListener("click", () => api.wakeTv());
      document.getElementById("off").addEventListener("click", () => api.tvOffSleep());
      document.getElementById("clear").addEventListener("click", () => {
        api.clearHistory();
        reset();
      });

      // --- Auth UI ------------------------------------------------------------
      // The OAuth client fields now live in Settings. "Sign in" is OAuth-only: if no client is
      // configured yet it routes the user to Settings; otherwise it opens the approval window.
      const statusEl = document.getElementById("status");
      const statusTextEl = document.getElementById("statusText");
      const loginBtn = document.getElementById("loginBtn");

      function renderStatus(s) {
        statusEl.className = "status " + (s.authorized ? "ok" : "off");
        statusTextEl.textContent = s.authorized
          ? "Signed in"
          : s.hasClient
          ? "Not authorized"
          : "Not connected";
        loginBtn.textContent = s.authorized ? "Account" : "Sign in";
      }

      async function refreshStatus() {
        renderStatus(await api.authStatus());
      }

      function setBusy(busy) {
        loginBtn.disabled = busy;
        loginBtn.textContent = busy ? "Waiting for approval…" : "Sign in";
      }

      loginBtn.addEventListener("click", async () => {
        const s = await api.authStatus();
        // No client configured yet (or already signed in) → open Settings to manage it.
        if (!s.hasClient || s.authorized) {
          openSettings();
          if (!s.hasClient) clientIdEl.focus();
          return;
        }
        setBusy(true);
        const res = await api.login();
        setBusy(false);
        await refreshStatus();
        // Closing the popup to abort is not a failure — leave the status as-is.
        if (!res.ok && !res.cancelled && res.error) statusTextEl.textContent = res.error;
      });

      // --- Settings UI --------------------------------------------------------
      const settingsBtn = document.getElementById("settingsBtn");
      const settingsOverlay = document.getElementById("settingsOverlay");
      const clientIdEl = document.getElementById("clientId");
      const clientSecretEl = document.getElementById("clientSecret");
      const redirectUriEl = document.getElementById("redirectUri");
      const pcInputEl = document.getElementById("pcInput");
      const minimizeToTrayEl = document.getElementById("minimizeToTray");
      const settingsErrorEl = document.getElementById("settingsError");
      const settingsSaveBtn = document.getElementById("settingsSaveBtn");
      const settingsCancelBtn = document.getElementById("settingsCancelBtn");
      const settingsCloseBtn = document.getElementById("settingsCloseBtn");
      const logoutBtn = document.getElementById("logoutBtn");

      async function openSettings() {
        const s = await api.getSettings();
        clientIdEl.value = s.clientId || "";
        clientSecretEl.value = s.clientSecret || "";
        redirectUriEl.value = s.redirectUri || "";
        pcInputEl.value = s.pcInput || "";
        minimizeToTrayEl.checked = s.minimizeToTrayOnClose;
        settingsErrorEl.textContent = "";
        const status = await api.authStatus();
        logoutBtn.style.display = status.hasClient || status.authorized ? "" : "none";
        settingsOverlay.classList.add("open");
        clientIdEl.focus();
      }

      function closeSettings() {
        settingsOverlay.classList.remove("open");
      }

      settingsBtn.addEventListener("click", openSettings);
      api.onOpenSettings(openSettings);
      settingsCancelBtn.addEventListener("click", closeSettings);
      settingsCloseBtn.addEventListener("click", closeSettings);
      settingsOverlay.addEventListener("click", (e) => {
        if (e.target === settingsOverlay) closeSettings();
      });

      settingsSaveBtn.addEventListener("click", async () => {
        settingsErrorEl.textContent = "";
        const pcInput = pcInputEl.value.trim();
        if (!pcInput) {
          settingsErrorEl.textContent = "PC input can't be empty.";
          return;
        }
        settingsSaveBtn.disabled = true;
        settingsCancelBtn.disabled = true;
        const res = await api.saveSettings({
          clientId: clientIdEl.value.trim(),
          clientSecret: clientSecretEl.value.trim(),
          redirectUri: redirectUriEl.value.trim(),
          pcInput,
          minimizeToTrayOnClose: minimizeToTrayEl.checked,
        });
        settingsSaveBtn.disabled = false;
        settingsCancelBtn.disabled = false;
        if (res && res.ok === false) {
          settingsErrorEl.textContent = res.error || "Failed to save settings.";
          return;
        }
        await refreshStatus();
        closeSettings();
      });

      logoutBtn.addEventListener("click", async () => {
        await api.logout();
        clientSecretEl.value = "";
        await refreshStatus();
        closeSettings();
      });

      refreshStatus();
    </script>
  </body>
</html>
