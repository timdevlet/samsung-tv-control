<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline';" />
    <title>Samsung TV Control</title>
    <style>
      :root {
        --bg: #0d1117;
        --panel: #161b22;
        --border: #30363d;
        --text: #c9d1d9;
        --muted: #8b949e;
        --accent: #2563eb;
        --accent-hover: #3b82f6;
        --error: #f85149;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        display: flex;
        flex-direction: column;
        background: var(--bg);
        color: var(--text);
        font: 13px/1.5 "Segoe UI", system-ui, -apple-system, sans-serif;
      }
      /* Universal header — one component, one style, used by the main screen and Settings.
         Built by renderHeader() below: a title (with optional subtitle), an optional extra
         slot (e.g. the auth status pill), then a row of buttons. */
      .app-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        background: var(--bg);
        border-bottom: 1px solid var(--border);
        flex: none;
      }
      .app-header .title { font-weight: 600; font-size: 16px; margin: 0; margin-right: auto; }
      .app-header .title small { color: var(--muted); font-weight: 400; font-size: 13px; margin-left: 8px; }
      /* Keep every button on one line — never shrink or wrap its label. */
      .app-header button { flex: none; white-space: nowrap; }
      button {
        font: inherit;
        color: var(--text);
        background: #21262d;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 6px 12px;
        cursor: pointer;
      }
      button:hover { background: #30363d; }
      button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
      button.primary:hover { background: var(--accent-hover); }
      button.danger { background: var(--error); border-color: var(--error); color: #fff; }
      button.danger:hover { background: #ff6a5f; border-color: #ff6a5f; }
      #log {
        flex: 1;
        overflow-y: auto;
        margin: 0;
        padding: 10px 14px;
        font-family: "Cascadia Code", "Consolas", ui-monospace, monospace;
        font-size: 12.5px;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .line { padding: 1px 0; }
      .line.error { color: var(--error); }
      .ts { color: var(--muted); }
      .var-string { color: #56d4dd; }
      .var-num { color: #e3b341; }
      /* Variables inside an error line keep the error color from overpowering them. */
      .line.error .var-string { color: #7ee8ef; }
      .line.error .var-num { color: #f0c674; }
      #log:empty::after {
        content: "Waiting for output…";
        color: var(--muted);
      }
      footer {
        flex: none;
        padding: 6px 14px;
        background: var(--panel);
        border-top: 1px solid var(--border);
        color: var(--muted);
        font-size: 12px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      footer label { display: flex; align-items: center; gap: 5px; cursor: pointer; }
      .count { margin-left: auto; }

      /* Auth status pill in the header */
      .status {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: var(--muted);
        margin-right: 4px;
      }
      .status .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--muted);
        flex: none;
      }
      .status.ok .dot { background: #3fb950; }
      .status.off .dot { background: var(--error); }

      /* Settings page — fills 100% of the window, replacing the log view while open. */
      .overlay {
        position: fixed;
        inset: 0;
        background: var(--bg);
        display: none;
        flex-direction: column;
      }
      .overlay.open { display: flex; }
      /* Scrollable body between the sticky header and footer. */
      .modal {
        flex: 1;
        width: 100%;
        max-width: none;
        overflow-y: auto;
        background: var(--bg);
        border: none;
        border-radius: 0;
        padding: 16px 20px 24px;
      }
      /* Keep form rows readable on a wide window while the page itself fills 100%. */
      .modal > * { max-width: 640px; margin-left: auto; margin-right: auto; }
      .modal p.hint { margin: 0 0 16px; color: var(--muted); font-size: 12px; }
      .field { margin-bottom: 12px; }
      .field label { display: block; margin-bottom: 4px; font-size: 12px; color: var(--muted); }
      .field input {
        width: 100%;
        font: inherit;
        color: var(--text);
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 7px 10px;
      }
      .field input:focus { outline: none; border-color: var(--accent); }
      /* input-with-hints — small gray suggestion buttons below an input that fill its value. */
      .input-with-hints .hints {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 6px;
      }
      .input-with-hints .hints .hint {
        padding: 2px 8px;
        font-size: 11px;
        color: var(--muted);
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 10px;
      }
      .input-with-hints .hints .hint:hover { color: var(--text); background: #21262d; }
      /* Hotkey capture row: a readonly input that shows the combo + a clear button. */
      .hotkey { display: flex; gap: 6px; align-items: stretch; }
      .hotkey .hotkey-input {
        flex: 1;
        cursor: pointer;
        font-family: "Cascadia Code", "Consolas", ui-monospace, monospace;
        text-align: center;
      }
      /* While listening for a combo, highlight the field and prompt the user. */
      .hotkey.capturing .hotkey-input {
        border-color: var(--accent);
        color: var(--muted);
      }
      .hotkey .hotkey-clear {
        flex: none;
        padding: 0 10px;
        color: var(--muted);
      }
      .hotkey .hotkey-clear:hover { color: var(--text); }
      .modal .error {
        color: var(--error);
        font-size: 12px;
        margin: 0 0 12px;
        min-height: 0;
      }
      /* Sticky footer — Cancel/Save always visible below the scrolling body.
         The inner row is capped to match the form's readable width above. */
      .modal-actions {
        flex: none;
        display: flex;
        gap: 8px;
        justify-content: flex-end;
        padding: 12px 20px;
        background: var(--panel);
        border-top: 1px solid var(--border);
      }
      .modal-actions > .row {
        display: flex;
        gap: 8px;
        width: 100%;
        max-width: 640px;
        margin: 0 auto;
        justify-content: flex-end;
      }
      .modal-actions .spacer { margin-right: auto; }
      /* Danger zone — destructive actions, set apart from normal settings */
      .danger-zone {
        margin-top: 20px;
        padding: 14px;
        border: 1px solid var(--error);
        border-radius: 8px;
      }
      .danger-zone h3 {
        margin: 0 0 4px;
        font-size: 13px;
        color: var(--error);
      }
      .danger-zone p { margin: 0 0 12px; color: var(--muted); font-size: 12px; }
      button:disabled { opacity: 0.55; cursor: default; }
      /* Toggle row inside a modal field — label left, macOS-style switch right */
      .field.check { display: flex; align-items: center; gap: 8px; }
      .field.check label { margin: 0; flex: 1; color: var(--text); cursor: pointer; }
      /* macOS-style toggle switch */
      .switch {
        position: relative;
        flex: none;
        width: 38px;
        height: 22px;
        cursor: pointer;
      }
      .switch input {
        position: absolute;
        z-index: 1;
        width: 100%;
        height: 100%;
        margin: 0;
        opacity: 0;
        cursor: pointer;
      }
      .switch .track {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: var(--border);
        border-radius: 11px;
        transition: background 0.15s ease;
      }
      .switch .track::before {
        content: "";
        position: absolute;
        top: 2px;
        left: 2px;
        width: 18px;
        height: 18px;
        background: #fff;
        border-radius: 50%;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
        transition: transform 0.15s ease;
      }
      .switch input:checked + .track { background: #3fb950; }
      .switch input:checked + .track::before { transform: translateX(16px); }
      .switch input:focus-visible + .track { outline: 2px solid var(--accent); outline-offset: 2px; }
    </style>
  </head>
  <body>
    <!-- Universal header, populated by renderHeader() in the script below. -->
    <div id="mainHeader"></div>

    <div class="overlay" id="settingsOverlay" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <!-- Same universal header component, just a different title + buttons. -->
      <div id="settingsHeader"></div>
      <div class="modal">
        <p class="hint">
          Paste the Client ID and Client Secret from your SmartThings OAuth-In app, then use
          Sign in (in the toolbar) to approve access — tokens are stored automatically.
        </p>
        <div class="field">
          <label for="clientId">Client ID</label>
          <input id="clientId" type="text" autocomplete="off" spellcheck="false" />
        </div>
        <div class="field">
          <label for="clientSecret">Client Secret</label>
          <input id="clientSecret" type="password" autocomplete="off" spellcheck="false" />
        </div>
        <div class="field">
          <label for="redirectUri">Redirect URI</label>
          <input id="redirectUri" type="text" autocomplete="off" spellcheck="false" />
        </div>
        <div class="field input-with-hints">
          <label for="pcInput">PC input</label>
          <input id="pcInput" type="text" autocomplete="off" spellcheck="false" placeholder="HDMI2" />
          <div class="hints" id="pcInputHints"></div>
        </div>
        <div class="field">
          <label>Wake TV → PC hotkey</label>
          <div class="hotkey" id="wakeHotkey">
            <input class="hotkey-input" type="text" readonly placeholder="Click, then press a combo" />
            <button type="button" class="hotkey-clear" title="Clear" aria-label="Clear hotkey">&times;</button>
          </div>
        </div>
        <div class="field">
          <label>TV Off &amp; Sleep hotkey</label>
          <div class="hotkey" id="offHotkey">
            <input class="hotkey-input" type="text" readonly placeholder="Click, then press a combo" />
            <button type="button" class="hotkey-clear" title="Clear" aria-label="Clear hotkey">&times;</button>
          </div>
        </div>
        <div class="field check">
          <span class="switch">
            <input id="minimizeToTray" type="checkbox" />
            <span class="track"></span>
          </span>
          <label for="minimizeToTray">Hide to tray on close (keep running in the background)</label>
        </div>
        <p class="error" id="settingsError"></p>
        <div class="danger-zone" id="dangerZone">
          <h3>Danger zone</h3>
          <p>Sign out to clear stored tokens from this device.</p>
          <button id="logoutBtn" class="danger">Sign out</button>
        </div>
      </div>
      <div class="modal-actions">
        <div class="row">
          <button id="settingsCancelBtn">Cancel</button>
          <button id="settingsSaveBtn" class="primary">Save</button>
        </div>
      </div>
    </div>
    <div id="log" role="log" aria-live="polite"></div>
    <footer>
      <label><input type="checkbox" id="autoscroll" checked /> Auto-scroll</label>
      <span class="count" id="count">0 lines</span>
    </footer>

    <script>
      const api = window.tvAPI;

      // --- Universal header ---------------------------------------------------
      // One header component, one style, shared by the main screen and Settings.
      // spec = { title, subtitle?, extra?, buttons: [{ id?, text, class?, ariaLabel?, onClick? }] }.
      // `extra` is an arbitrary node placed between the title and the buttons (e.g. the auth
      // status pill). Returns the created elements keyed by their button id for later wiring.
      function renderHeader(mount, spec) {
        mount.className = "app-header";
        mount.replaceChildren();

        const title = document.createElement("h2");
        title.className = "title";
        if (spec.titleId) title.id = spec.titleId;
        title.append(document.createTextNode(spec.title));
        if (spec.subtitle) {
          const small = document.createElement("small");
          small.textContent = spec.subtitle;
          title.appendChild(small);
        }
        mount.appendChild(title);

        if (spec.extra) mount.appendChild(spec.extra);

        const refs = {};
        for (const b of spec.buttons || []) {
          const btn = document.createElement("button");
          if (b.id) { btn.id = b.id; refs[b.id] = btn; }
          if (b.class) btn.className = b.class;
          if (b.ariaLabel) btn.setAttribute("aria-label", b.ariaLabel);
          btn.textContent = b.text;
          if (b.onClick) btn.addEventListener("click", b.onClick);
          mount.appendChild(btn);
        }
        return refs;
      }

      // --- input-with-hints ---------------------------------------------------
      // Attaches small gray suggestion buttons (rendered into `hintsEl`) below `input`.
      // Clicking a hint fills the input with that value and focuses it.
      function makeInputWithHints(input, hintsEl, hints) {
        hintsEl.replaceChildren();
        for (const value of hints) {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "hint";
          btn.textContent = value;
          btn.addEventListener("click", () => {
            input.value = value;
            input.focus();
          });
          hintsEl.appendChild(btn);
        }
      }

      // Auth status pill — lives in the main header as its `extra` slot.
      const statusPill = document.createElement("span");
      statusPill.className = "status";
      statusPill.id = "status";
      statusPill.innerHTML = '<span class="dot"></span><span id="statusText">Checking…</span>';

      // Main screen header: title + status pill + action buttons. Click handlers are attached
      // later (once their helpers exist), so here we only declare ids to wire up by reference.
      renderHeader(document.getElementById("mainHeader"), {
        title: "Samsung TV Control",
        subtitle: "log",
        extra: statusPill,
        buttons: [
          { id: "loginBtn", text: "Sign in" },
          { id: "settingsBtn", text: "Settings" },
          { id: "wake", text: "Wake TV → PC", class: "primary" },
          { id: "off", text: "TV off + sleep" },
          { id: "clear", text: "Clear" },
        ],
      });

      // Settings header: same component, just a title and a single close button.
      renderHeader(document.getElementById("settingsHeader"), {
        title: "Settings",
        titleId: "settingsTitle",
        buttons: [
          { id: "settingsCloseBtn", text: "Close", ariaLabel: "Close" },
        ],
      });

      const logEl = document.getElementById("log");
      const countEl = document.getElementById("count");
      const autoscrollEl = document.getElementById("autoscroll");
      let count = 0;

      function nearBottom() {
        return logEl.scrollHeight - logEl.scrollTop - logEl.clientHeight < 40;
      }

      // Mirror of the highlighting rules in src/log.ts. Kept in sync by hand —
      // the timestamp is dimmed, and "variable" tokens (quoted strings, counts
      // like 1/3, numbers, → / ✅) are colored. Built with DOM text nodes (never
      // innerHTML) so log content can't inject markup under the strict CSP.
      const TIMESTAMP_RE = /^\[\d{1,2}:\d{2}:\d{2}(?:\s?[AP]M)?\]/i;
      const VAR_RE = /("[^"]*"|`[^`]*`)|(\b\d+(?:\.\d+)?(?:\/\d+)?(?:\s?(?:ms|s|min|m))?\b)|([→✅])/g;

      function highlightInto(div, text) {
        const ts = text.match(TIMESTAMP_RE);
        if (ts) {
          const span = document.createElement("span");
          span.className = "ts";
          span.textContent = ts[0];
          div.appendChild(span);
          text = text.slice(ts[0].length);
        }
        let last = 0;
        for (const m of text.matchAll(VAR_RE)) {
          if (m.index > last) div.appendChild(document.createTextNode(text.slice(last, m.index)));
          const span = document.createElement("span");
          span.className = m[1] || m[3] ? "var-string" : "var-num";
          span.textContent = m[0];
          div.appendChild(span);
          last = m.index + m[0].length;
        }
        if (last < text.length) div.appendChild(document.createTextNode(text.slice(last)));
      }

      // Each entry carries a monotonic id from the main process. The history backlog and the live
      // onLog stream can overlap (a line logged right as the window opens lands in both), so dedupe
      // by id to render every line exactly once.
      const seenIds = new Set();

      function append(entry) {
        if (entry.id !== undefined) {
          if (seenIds.has(entry.id)) return;
          seenIds.add(entry.id);
        }
        const atBottom = nearBottom();
        const div = document.createElement("div");
        div.className = "line" + (entry.level === "error" ? " error" : "");
        // Render blank-line separators (the daemon prefixes some lines with \n) as real spacing.
        highlightInto(div, entry.message.replace(/^\n+/, ""));
        if (/^\n/.test(entry.message)) div.style.marginTop = "8px";
        logEl.appendChild(div);
        count++;
        countEl.textContent = count + (count === 1 ? " line" : " lines");
        if (autoscrollEl.checked && atBottom) logEl.scrollTop = logEl.scrollHeight;
      }

      function reset() {
        logEl.replaceChildren();
        seenIds.clear();
        count = 0;
        countEl.textContent = "0 lines";
      }

      // Subscribe to the live stream BEFORE fetching history so a line logged in the gap isn't lost;
      // append() dedupes by id, so any overlap between the two sources renders only once.
      api.onLog(append);

      (async () => {
        const history = await api.getHistory();
        for (const entry of history) append(entry);
        logEl.scrollTop = logEl.scrollHeight;
      })();

      document.getElementById("wake").addEventListener("click", () => api.wakeTv());
      document.getElementById("off").addEventListener("click", () => api.tvOffSleep());
      document.getElementById("clear").addEventListener("click", () => {
        api.clearHistory();
        reset();
      });

      // --- Auth UI ------------------------------------------------------------
      // The OAuth client fields now live in Settings. "Sign in" is OAuth-only: if no client is
      // configured yet it routes the user to Settings; otherwise it opens the approval window.
      const statusEl = document.getElementById("status");
      const statusTextEl = document.getElementById("statusText");
      const loginBtn = document.getElementById("loginBtn");

      function renderStatus(s) {
        statusEl.className = "status " + (s.authorized ? "ok" : "off");
        statusTextEl.textContent = s.authorized
          ? "Signed in"
          : s.hasClient
          ? "Not authorized"
          : "Not connected";
        loginBtn.textContent = s.authorized ? "Account" : "Sign in";
      }

      async function refreshStatus() {
        renderStatus(await api.authStatus());
      }

      function setBusy(busy) {
        loginBtn.disabled = busy;
        loginBtn.textContent = busy ? "Waiting for approval…" : "Sign in";
      }

      loginBtn.addEventListener("click", async () => {
        const s = await api.authStatus();
        // No client configured yet (or already signed in) → open Settings to manage it.
        if (!s.hasClient || s.authorized) {
          openSettings();
          if (!s.hasClient) clientIdEl.focus();
          return;
        }
        setBusy(true);
        const res = await api.login();
        setBusy(false);
        await refreshStatus();
        // Closing the popup to abort is not a failure — leave the status as-is.
        if (!res.ok && !res.cancelled && res.error) statusTextEl.textContent = res.error;
      });

      // --- Settings UI --------------------------------------------------------
      const settingsBtn = document.getElementById("settingsBtn");
      const settingsOverlay = document.getElementById("settingsOverlay");
      const clientIdEl = document.getElementById("clientId");
      const clientSecretEl = document.getElementById("clientSecret");
      const redirectUriEl = document.getElementById("redirectUri");
      const pcInputEl = document.getElementById("pcInput");
      makeInputWithHints(pcInputEl, document.getElementById("pcInputHints"), [
        "HDMI1", "HDMI2", "HDMI3", "HDMI4",
      ]);
      const minimizeToTrayEl = document.getElementById("minimizeToTray");
      const settingsErrorEl = document.getElementById("settingsError");
      const settingsSaveBtn = document.getElementById("settingsSaveBtn");
      const settingsCancelBtn = document.getElementById("settingsCancelBtn");
      const settingsCloseBtn = document.getElementById("settingsCloseBtn");
      const logoutBtn = document.getElementById("logoutBtn");
      const dangerZone = document.getElementById("dangerZone");

      // --- Hotkey capture ----------------------------------------------------
      // Wraps a .hotkey widget: click to listen, press a combo, and it's stored as an Electron
      // accelerator string (e.g. "Command+Control+E") on the element. A valid combo needs at least
      // one modifier plus a non-modifier key, so a global shortcut can't swallow normal typing.
      const IS_MAC = navigator.platform.toLowerCase().includes("mac");
      // Map a KeyboardEvent.code/key to the accelerator key token Electron expects.
      function acceleratorKey(e) {
        const code = e.code;
        if (/^Key[A-Z]$/.test(code)) return code.slice(3); // KeyE → E
        if (/^Digit\d$/.test(code)) return code.slice(5); // Digit1 → 1
        if (/^F\d{1,2}$/.test(code)) return code; // F1..F24
        const named = {
          Space: "Space", Enter: "Return", Tab: "Tab", Backspace: "Backspace",
          Delete: "Delete", Escape: "Escape", ArrowUp: "Up", ArrowDown: "Down",
          ArrowLeft: "Left", ArrowRight: "Right", Equal: "Plus", Minus: "-",
        };
        return named[code] || null;
      }
      function makeHotkeyField(id) {
        const root = document.getElementById(id);
        const input = root.querySelector(".hotkey-input");
        const clearBtn = root.querySelector(".hotkey-clear");
        let accel = ""; // current accelerator string, "" = unset
        let capturing = false;

        function render() {
          input.value = accel || "";
          input.placeholder = capturing ? "Press a combo…" : "Click, then press a combo";
          root.classList.toggle("capturing", capturing);
        }
        function stop() {
          capturing = false;
          window.removeEventListener("keydown", onKeyDown, true);
          render();
        }
        function onKeyDown(e) {
          e.preventDefault();
          e.stopPropagation();
          if (e.key === "Escape") return stop(); // cancel, keep the previous value
          const key = acceleratorKey(e);
          // Ignore a press that's only modifiers — wait for the real key.
          if (!key) return;
          const mods = [];
          if (e.metaKey) mods.push("Command");
          if (e.ctrlKey) mods.push("Control");
          if (e.altKey) mods.push("Alt");
          if (e.shiftKey) mods.push("Shift");
          if (mods.length === 0) {
            // Reject a bare key — needs at least one modifier to be a safe global shortcut.
            settingsErrorEl.textContent = "Hotkey needs at least one modifier (⌘/Ctrl/Alt/Shift).";
            return;
          }
          settingsErrorEl.textContent = "";
          accel = [...mods, key].join("+");
          stop();
        }
        input.addEventListener("click", () => {
          if (capturing) return;
          capturing = true;
          render();
          window.addEventListener("keydown", onKeyDown, true);
        });
        clearBtn.addEventListener("click", () => {
          accel = "";
          if (capturing) stop();
          else render();
        });
        return {
          set: (v) => { accel = v || ""; if (capturing) stop(); else render(); },
          get: () => accel,
          stop,
        };
      }
      const wakeHotkeyField = makeHotkeyField("wakeHotkey");
      const offHotkeyField = makeHotkeyField("offHotkey");

      async function openSettings() {
        const s = await api.getSettings();
        clientIdEl.value = s.clientId || "";
        clientSecretEl.value = s.clientSecret || "";
        redirectUriEl.value = s.redirectUri || "";
        pcInputEl.value = s.pcInput || "";
        minimizeToTrayEl.checked = s.minimizeToTrayOnClose;
        wakeHotkeyField.set(s.wakeHotkey || "");
        offHotkeyField.set(s.offHotkey || "");
        settingsErrorEl.textContent = "";
        const status = await api.authStatus();
        // Sign out only makes sense when actually signed in.
        dangerZone.style.display = status.authorized ? "" : "none";
        settingsOverlay.classList.add("open");
        clientIdEl.focus();
      }

      function closeSettings() {
        // Drop any in-progress capture so its keydown listener doesn't outlive the modal.
        wakeHotkeyField.stop();
        offHotkeyField.stop();
        settingsOverlay.classList.remove("open");
      }

      settingsBtn.addEventListener("click", openSettings);
      api.onOpenSettings(openSettings);
      settingsCancelBtn.addEventListener("click", closeSettings);
      settingsCloseBtn.addEventListener("click", closeSettings);

      settingsSaveBtn.addEventListener("click", async () => {
        settingsErrorEl.textContent = "";
        const pcInput = pcInputEl.value.trim();
        if (!pcInput) {
          settingsErrorEl.textContent = "PC input can't be empty.";
          return;
        }
        settingsSaveBtn.disabled = true;
        settingsCancelBtn.disabled = true;
        const res = await api.saveSettings({
          clientId: clientIdEl.value.trim(),
          clientSecret: clientSecretEl.value.trim(),
          redirectUri: redirectUriEl.value.trim(),
          pcInput,
          minimizeToTrayOnClose: minimizeToTrayEl.checked,
          wakeHotkey: wakeHotkeyField.get(),
          offHotkey: offHotkeyField.get(),
        });
        settingsSaveBtn.disabled = false;
        settingsCancelBtn.disabled = false;
        if (res && res.ok === false) {
          settingsErrorEl.textContent = res.error || "Failed to save settings.";
          return;
        }
        await refreshStatus();
        closeSettings();
      });

      logoutBtn.addEventListener("click", async () => {
        await api.logout();
        clientSecretEl.value = "";
        await refreshStatus();
        closeSettings();
      });

      refreshStatus();
    </script>
  </body>
</html>
